      /* Saglabāti stili Google Translate elementu slēpšanai */
      .goog-te-banner-frame, .goog-te-combo, #google_translate_element, 
      .skiptranslate, #goog-gt-tt, .goog-te-spinner-pos, .goog-te-balloon-frame {

    <script type="text/javascript">
      window.googleTranslateElementInit = function () {
        if (window.google && window.google.translate) {
          new google.translate.TranslateElement({
            pageLanguage: 'lv',
            includedLanguages: 'lv,en,ru',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false,
          }, 'google_translate_element');
        }
      };
      (function loadGoogleTranslate() {
        const script = document.createElement('script');
        script.type = 'text/javascript';
        script.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
        script.async = true;
        document.head.appendChild(script);
      })();
    </script>
